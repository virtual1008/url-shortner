spring:
  application:
    name: url-shortener-test

  datasource:
    url: jdbc:postgresql://localhost:5432/linkscale_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


  data:
    redis:
      host: localhost
      port: 6379
      database: 1


application:
  base-url: http://localhost:8080/api/v1/url
  ratelimit:
    type: "in-memory"
    enabled: false