spring:
  application:
    name: url-shortener
  redis:
    host: localhost
    port: 6379
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

  datasource:
    url: jdbc:postgresql://localhost:5432/url_shortener
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

application:
  base-url: http://localhost:8080/api/v1/url
  snowflake:
    node-id: 1
  retention:
    default-years: 5
    deleted-days: 30
    hard-delete-days: 365
  cleanup:
    cron: "0 0 2 * * *"
  redis:
    id-key: "url:id:counter"
    url-prefix: "url:"
    ttl-hours: 24
  pagination:
    default-page: 0
    default-size: 20
    max-size: 100
  ratelimit:
    # Options: "none" (Baseline), "in-memory" (Local Dev), "redis" (Distributed)
    type: "redis"
    key-prefix: "rate_limit:ip:"

logging:
  level:
    root: INFO
    com.ujjval.url_shortener: DEBUG
